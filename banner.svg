<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Noah Nyholm Bracher — Artificial Intelligence | Automation (n8n) | Systems Thinking">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#111820" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>
  <rect width="1200" height="220" fill="url(#grid)" opacity="0.35"/>

  <path d="M0,150 C200,110 330,185 520,150 C740,108 940,188 1200,140 L1200,220 L0,220 Z"
        fill="url(#neon)" opacity="0.35" filter="url(#glow)"/>

  <path d="M0,150 C200,110 330,185 520,150 C740,108 940,188 1200,140"
        fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.9"/>

  <g filter="url(#glow)">
    <text x="50%" y="90" text-anchor="middle"
          font-family="JetBrains Mono, monospace"
          font-size="44" font-weight="800" fill="#00F0FF" letter-spacing="2">
      NOAH NYHOLM BRACHER
    </text>
    <text x="50%" y="125" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-size="16" fill="#8fdbe1">
      Artificial Intelligence | Automation (n8n) | Systems Thinking
    </text>
  </g>
</svg>
